<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Aviso para virar o celular -->
    <div id="rotateWarning">
        <svg viewBox="0 0 24 24"><path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.44 4.84 18.29 0 12 0l-.66.03 3.81 3.81 1.33-1.32zm-6.25-.77c-.59-.59-1.54-.59-2.12 0L1.75 8.11c-.59.59-.59 1.54 0 2.12l12.02 12.02c.59.59 1.54.59 2.12 0l6.36-6.36c.59-.59.59-1.54 0-2.12L10.23 1.75zm4.6 19.44L2.81 9.17l6.36-6.36 12.02 12.02-6.36 6.36zm-7.31.29l.66-.03-3.81-3.81-1.33 1.33c-3.27-1.56-5.61-4.73-5.97-8.49H.59C.56 19.16 5.71 24 12 24l.66-.03-3.81-3.81-1.33 1.32z"/></svg>
        <p style="font-family: 'Orbitron'; font-size: 18px; letter-spacing: 2px;">GIRE PARA JOGAR</p>
        <p style="font-size: 14px; margin-top: 10px; opacity: 0.7;">Este jogo funciona melhor em paisagem</p>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="ui-panel">
                <div class="ui-title">Score</div>
                <div class="ui-value" id="scoreDisplay">0</div>
            </div>
            <div class="ui-panel">
                <div class="ui-title">Coins</div>
                <div class="ui-value" id="coinDisplay">0</div>
            </div>
            <div class="ui-panel">
                <div class="ui-title">Level</div>
                <div class="ui-value" id="levelDisplay">1</div>
            </div>
        </div>

        <!-- Dicas de teclado (Desktop) -->
        <div class="controls-hint">
            <div class="key-hint"><span class="key">A/D</span> Move</div>
            <div class="key-hint"><span class="key">W/Space</span> Jump</div>
            <div class="key-hint"><span class="key">F</span> Fullscreen</div>
        </div>

        <!-- Controles Touch (Mobile) -->
        <div class="touch-controls">
            <div class="left-controls">
                <button class="touch-btn" id="btnLeft">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                <button class="touch-btn" id="btnRight">
                    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </button>
            </div>
            <div class="right-controls">
                <button class="touch-btn action-btn" id="btnJump">
                    <svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>
                </button>
            </div>
        </div>

        <div id="startScreen">
            <h1 class="game-title">NEON RUNNER</h1>
            <p class="game-subtitle">Cyber Platform Adventure</p>
            <button class="start-btn" id="startBtn">START GAME</button>
        </div>

        <div id="gameOverScreen">
            <h1 class="game-title">GAME OVER</h1>
            <p class="game-subtitle">Your Journey Ends</p>
            <div class="final-score" id="finalScore">0</div>
            <button class="start-btn" id="restartBtn">TRY AGAIN</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
